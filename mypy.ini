[mypy]
python_version = 3.12
strict = True
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True

# Home Assistant is not installed in dev environment
[mypy-homeassistant.*]
ignore_missing_imports = True

# voluptuous type stubs may not be available
[mypy-voluptuous.*]
ignore_missing_imports = True

# aiohttp type stubs may not be available
[mypy-aiohttp.*]
ignore_missing_imports = True